<section class="discover">
    <div class="container">
        <div class="discover__grid">
            <div class="discover__desc">
                <div class="discover__title">
                    <h1 class="title-1 title-1--decor">Discover your favorite place with us</h1>
                </div>
                <div class="discover__text text">
                    <p class="description">
                        Your journey begins here with our curated travel experiences. Discover new horizons, create lasting memories, and explore the world with our expertly crafted itineraries.
                    </p>
                </div>
                <!-- Form START -->
                <form class="discover__form">
                    <label class="form__label" for="locations">
                        <span>Locations</span>
                        <input id="autoCompleteCountry" class="form__input" type="text" name="locations" id="locations" placeholder="e.g Bali, Indonesia" value="">
                    </label>
                    <div class="form__devider"></div>
                    <label class="form__label" for="date">
                        <span>Date and time</span>
                        <input class="form__input" type="text" name="date" id="datePicket" placeholder="MM/DD/YYYY">
                    </label>
                    <input class="form-search-btn" type="image" src="./img/logo/search.svg">
                </form>
                <!-- Form END -->
            </div>
            <div class="discover__picture">
                <div class="discover__picture-hint">
                    @@include('elements/hint-discover.html')
                </div>
                <img src="./img/header/subtract.png" alt="Picture" class="discover__picture-img">
                <div class="discover__picture-scroll">
                    @@include('elements/scroll-down.html')
                </div>
            </div>
        </div>
    </div>
</section>
